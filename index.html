<!DOCTYPE html>
<html lang="id" style="background:#050508;color:#e8e8f0;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>ArenaGG — Esport Tournament Platform</title>
    <meta name="description" content="Platform turnamen esport lokal terbaik untuk Mobile Legends, PUBG, Free Fire." />
    <meta name="theme-color" content="#050508" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <meta name="build-version" content="2.2.0" />
    <style>
      /* Fallback styles before JS loads */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        background: #050508;
        color: #e8e8f0;
        min-height: 100vh;
        font-family: 'Rajdhani', system-ui, sans-serif;
        -webkit-text-size-adjust: 100%;
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        min-height: 100vh;
        background: #050508;
      }
      /* Loading state */
      #root:empty::after {
        content: '';
        position: fixed;
        inset: 0;
        background: #050508;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
